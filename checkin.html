<!doctype html>
<!-- NailSync · CHECK-IN V2 — "lễ tân ảo biết bán hàng" (founder duyệt 09/06/2026)
     6 bước: chào+nhận diện → nhóm (ảnh+giá từ) → gói 3 bậc → dáng/độ dài → add-on → xác nhận+cảm ơn.
     Menu/giá/ảnh đọc từ salon_rules.service_menu (config từng tiệm). Khách quen: 1 chạm làm lại bộ cũ.
     URL: checkin.html?salon=<SALON_ID> -->
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>NailSync — Check in</title>
<style>
  :root{
    --ink:#2b2026; --ink-soft:#6c5b63; --muted:#a2929a;
    --rose:#c2185b; --rose-deep:#9d1248; --blush:#fde7ef; --gold:#caa56a;
    --line:#f1e4ea; --shadow:0 18px 50px -18px rgba(157,18,72,.30);
    --serif:'Cambria','Times New Roman','Noto Serif',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:var(--sans);color:var(--ink);min-height:100svh;display:flex;justify-content:center;
    padding:18px 14px 90px;background:linear-gradient(180deg,#fff7fb,#fff3f7)}
  .stage{width:min(460px,100%)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px}
  .brand{font-family:var(--serif);font-size:20px;font-weight:600;color:#3a2630}
  .brand b{color:var(--rose)}
  .lang{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;font:600 12.5px var(--sans);color:var(--muted);padding:5px 11px;border-radius:999px;cursor:pointer}
  .lang button.on{background:var(--rose);color:#fff}
  .card{background:#fff;border:1px solid #fbeef3;border-radius:26px;box-shadow:var(--shadow);padding:22px 18px;animation:rise .45s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  h1{font-family:var(--serif);font-weight:600;font-size:24px;margin:0 0 4px}
  .sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 16px;line-height:1.5}
  .back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:8px;font-family:inherit}
  input[type=text]{width:100%;font:16px var(--sans);color:var(--ink);padding:13px 14px;border:1.5px solid var(--line);border-radius:14px;background:#fffdfe}
  input[type=text]:focus{outline:0;border-color:#f1a6c4}
  .or{display:flex;align-items:center;gap:12px;color:#c7b8bf;font-size:11.5px;margin:11px 2px;letter-spacing:.1em;text-transform:uppercase}
  .or::before,.or::after{content:"";height:1px;flex:1;background:var(--line)}
  .cta{width:100%;margin-top:14px;font:650 16px var(--sans);color:#fff;border:0;border-radius:15px;padding:15px;cursor:pointer;background:linear-gradient(145deg,#e23a7e,#b3164e)}
  .cta:disabled{opacity:.45}
  .ghost{width:100%;margin-top:9px;font:600 14px var(--sans);color:var(--rose-deep);border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:11px;cursor:pointer}
  .groups{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .gcard{position:relative;border:1.5px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;background:#fff;text-align:left;padding:0;font-family:inherit}
  .gcard img{width:100%;height:86px;object-fit:cover;display:block}
  .gcard .gt{display:block;padding:8px 10px 10px}
  .gcard .nm{font-weight:700;font-size:14.5px;color:#3a2731}
  .gcard .pr{font-size:11.5px;color:var(--muted);margin-top:1px}
  .gcard .sv{position:absolute;top:7px;left:7px;background:#fff7e8;color:#9a6a1f;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
  .pk{border:1.5px solid var(--line);border-radius:16px;padding:12px;margin-bottom:9px;cursor:pointer;position:relative}
  .pk.pop{border:2px solid var(--rose)}
  .pk .badge{position:absolute;top:-9px;left:12px;background:var(--blush);color:var(--rose-deep);font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:8px}
  .pk .row1{display:flex;justify-content:space-between;font-weight:700;font-size:15px}
  .pk .d{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .pk .mins{font-size:11px;color:var(--muted)}
  .pk.sel{background:var(--blush)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:9px 13px;font-size:14px;cursor:pointer;font-family:inherit}
  .chip.sel{border-color:var(--rose);background:var(--blush);color:var(--rose-deep);font-weight:700}
  .tip{background:#fff7e8;color:#9a6a1f;font-size:12px;border-radius:10px;padding:8px 10px;margin:4px 0 8px}
  #est{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(440px,calc(100% - 24px));
    background:#2b2026;color:#fff;border-radius:16px;padding:11px 16px;display:none;align-items:center;justify-content:space-between;z-index:50}
  #est .e1{font-size:12px;color:#cfc3c9}
  #est .e2{font-size:18px;font-weight:700}
  .wk{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
  .wk button{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit}
  .wk button.sel{border-color:var(--rose);background:var(--blush);color:var(--rose-deep);font-weight:700}
  .done{text-align:center;padding:8px 0}
  .done .big{font-size:50px}
  .qrow{display:flex;gap:8px;align-items:center;justify-content:center;color:var(--ink-soft);font-size:13.5px;margin:8px 0}
  .footer{text-align:center;color:#c2b2ba;font-size:11px;margin-top:14px}
</style>
</head>
<body>
<div class="stage">
  <div class="topbar">
    <div class="brand" id="brand">Nail<b>Sync</b></div>
    <div class="lang"><button id="lvi" onclick="setLang('vi')">VI</button><button id="len" onclick="setLang('en')">EN</button></div>
  </div>
  <div class="card" id="app"><h1>…</h1></div>
  <div class="footer">Powered by NailSync</div>
</div>
<div id="est"><span class="e1" id="estL"></span><span class="e2" id="estV"></span></div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://liavvyeklmixeyudfwxm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpYXZ2eWVrbG1peGV5dWRmd3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3ODgyOTAsImV4cCI6MjA5NjM2NDI5MH0.vzUiOMRkWYSZ4zGejqKAvq0_-C3YIrM_wa0fTyOmT-E";
/* ========================================== */
const QS = new URLSearchParams(location.search);
const SALON = QS.get("salon");
const KIOSK = QS.get("kiosk")==="1";   // tablet ở quầy: không giữ vé, mỗi khách check-in xong là về màn đầu
const $ = id => document.getElementById(id);
const esc = s => (s??"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let lang = localStorage.getItem("ns_lang") || ((navigator.language||"en").slice(0,2)==="vi"?"vi":"en");
const T = {
  vi:{hello:["Chào buổi sáng ạ!","Chào buổi trưa ạ!","Chào buổi chiều ạ!","Chào buổi tối ạ!"],
      sub0:"Mình check-in liền nha — 30 giây thôi ạ", name:"Tên của mình", or:"hoặc khách quen chỉ cần",
      last4:"4 số cuối điện thoại", privacy:"chỉ dùng để nhớ bộ móng của mình thôi ạ", next:"Tiếp tục",
      wb:"Mừng quá, gặp lại", lastTime:"Lần trước mình làm", redo:"Làm lại bộ này", seeMenu:"hoặc xem menu hôm nay",
      q1:"Hôm nay mình làm gì nè?", q2:"chọn gói nào ạ?", pop:"Được chọn nhiều nhất",
      q3:"Chọn dáng móng nha", q4:"Thêm cho đẹp nha?", skip:"(bỏ qua được ạ)",
      q5:"Gần xong rồi nè", reqW:"Mình muốn thợ nào không? (không bắt buộc)", anyW:"Ai cũng được",
      party:"Mình đi mấy người?", est:"Tạm tính", mins:"phút", checkin:"Check-in luôn",
      doneT:"Xong rồi nè", doneSub:"Mời mình ngồi nghỉ — lễ tân gọi mình liền ạ",
      ahead:"Trước mình còn", people:"khách", wait:"chờ khoảng", drinkCta:"Uống gì trong lúc chờ nè? — miễn phí",
      again:"Check-in khách tiếp theo", noSalon:"Thiếu mã tiệm trong QR", fail:"Gửi không được, mình gặp lễ tân giúp em nha",
      back:"‹ Quay lại", estNote:"giá tạm tính — lễ tân xác nhận lại với mình ạ",
      keepOpen:"Giữ trang này mở nha — tới lượt mình nó tự báo, xong nó tự hiện chỗ chấm điểm 💕",
      tWait:"Mình đang trong hàng chờ", tUp:"Tới lượt mình rồi!", tUpSub:"thợ", tChair:"Ghế",
      tDoing:"Đang làm cho mình nè 💅", tDone:"Xong rồi! Mình thấy sao ạ?", tDoneSub:"Chạm sao để chấm — 5 giây thôi",
      tCmt:"Nhắn gì thêm không ạ? (không bắt buộc)", tSend:"Gửi đánh giá", tThanks:"Cảm ơn mình nhiều lắm 💖",
      tThanksSub:"Hẹn gặp lại nha!", tCancel:"Check-in này đã được huỷ ở quầy", tBye:"Xong — đóng trang được rồi ạ",
      fbSorry:"Tụi em xin lỗi mình nhiều lắm 🙏", fbSorrySub:"Cho tụi em biết chỗ sai để sửa liền nha — chọn được nhiều ô ạ",
      fbMid:"Cảm ơn mình 💛", fbMidSub:"Điều gì làm mình chưa trọn 5 sao ạ? (chọn được nhiều ô)",
      fbPhone:"Số điện thoại — chủ tiệm sẽ đích thân gọi xin lỗi mình (không bắt buộc)",
      fbLowDone:"Tụi em ghi nhận rồi ạ 🙏", fbLowDoneSub:"Chủ tiệm sẽ liên lạc xin lỗi mình sớm nhất. Mong được chuộc lỗi lần sau!",
      fbGoogle:"Thương tụi em? Khen tụi em trên Google nha 💕", fbGoogleBtn:"⭐ Viết review trên Google",
      isWait:"Chờ lâu", isAtt:"Thái độ", isQual:"Chất lượng móng", isPrice:"Giá", isClean:"Vệ sinh", isOther:"Khác"},
  en:{hello:["Good morning!","Good afternoon!","Good afternoon!","Good evening!"],
      sub0:"Let's get you checked in — 30 seconds, promise", name:"Your name", or:"returning guest? just enter",
      last4:"last 4 digits of your phone", privacy:"only used to remember your usual set", next:"Continue",
      wb:"So happy to see you again,", lastTime:"Last time you had", redo:"Repeat this set", seeMenu:"or browse today's menu",
      q1:"What are we doing today?", q2:"pick your package", pop:"Most popular",
      q3:"Pick your shape", q4:"A little something extra?", skip:"(totally optional)",
      q5:"Almost done!", reqW:"Request a technician? (optional)", anyW:"Anyone is fine",
      party:"How many of you today?", est:"Estimate", mins:"min", checkin:"Check me in",
      doneT:"You're all set", doneSub:"Have a seat — reception will call you in a moment",
      ahead:"Ahead of you:", people:"guests", wait:"about", drinkCta:"Something to sip while you wait? — free",
      again:"Next guest check-in", noSalon:"Missing salon code in QR", fail:"Couldn't send — please see reception",
      back:"‹ Back", estNote:"estimate only — reception will confirm with you",
      keepOpen:"Keep this page open — it'll buzz when it's your turn and show the rating right here 💕",
      tWait:"You're in line", tUp:"It's your turn!", tUpSub:"with", tChair:"Chair",
      tDoing:"You're being pampered 💅", tDone:"All done! How was it?", tDoneSub:"Tap the stars — takes 5 seconds",
      tCmt:"Anything you'd like us to know? (optional)", tSend:"Send rating", tThanks:"Thank you so much 💖",
      tThanksSub:"See you next time!", tCancel:"This check-in was cancelled at the desk", tBye:"All set — you can close this page",
      fbSorry:"We're so sorry 🙏", fbSorrySub:"Tell us what went wrong so we can fix it — pick all that apply",
      fbMid:"Thank you 💛", fbMidSub:"What kept this from being 5 stars? (pick all that apply)",
      fbPhone:"Phone number — the owner will personally call to apologize (optional)",
      fbLowDone:"We hear you 🙏", fbLowDoneSub:"The owner will reach out to apologize soon. Please give us another chance!",
      fbGoogle:"Love us? Share it on Google 💕", fbGoogleBtn:"⭐ Write a Google review",
      isWait:"Long wait", isAtt:"Attitude", isQual:"Nail quality", isPrice:"Price", isClean:"Cleanliness", isOther:"Other"}
};
const t = k => T[lang][k];
function setLang(l){ lang=l; localStorage.setItem("ns_lang",l);
  $("lvi").classList.toggle("on",l==="vi"); $("len").classList.toggle("on",l==="en"); render(); }
const L = o => lang==="vi" ? (o.vi??o.en) : (o.en??o.vi);
const Ld = o => lang==="vi" ? (o.vi_d??o.en_d??"") : (o.en_d??o.vi_d??"");

async function rpc(fn,args){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`,{method:"POST",
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,"content-type":"application/json"},
    body:JSON.stringify(args||{})});
  const x = await r.text(); let d=null; try{d=x?JSON.parse(x):null}catch(e){d=x}
  if(!r.ok) throw new Error((d&&(d.message||d.hint))||x||r.status);
  return d;
}

let MENU=null, WORKERS=[], step=0;
let S = resetSel();
function resetSel(){ return {name:"", last4:"", ret:null, group:null, pkg:null, opts:[], addons:[], worker:null, party:1}; }
function price(){ let p = S.pkg? S.pkg.price:0;
  (S.opts||[]).forEach(k=>{ const o=(S.group.options||[]).find(x=>x.k===k); if(o) p+=o.d||0; });
  (S.addons||[]).forEach(k=>{ const a=MENU.addons.find(x=>x.k===k); if(a) p+=a.price; });
  return p; }
function minutes(){ let m = S.pkg? S.pkg.min:0; m += (S.addons||[]).length*8; return m; }
function showEst(on){ const e=$("est");
  if(on && S.pkg){ e.style.display="flex"; $("estL").textContent = t("est")+" · ~"+minutes()+" "+t("mins");
    $("estV").textContent = "~$"+price(); } else e.style.display="none"; }

function hour(){ const h=new Date().getHours(); return h<11?0:h<14?1:h<18?2:3; }

function render(){
  if(!MENU) return;
  showEst(step>=2 && step<=5);
  if(step===0) return s0();
  if(step===1) return s1();
  if(step===2) return s2();
  if(step===3) return s3();
  if(step===4) return s4();
  if(step===5) return s5();
}

function s0(){
  $("app").innerHTML = `
    <h1>${t("hello")[hour()]} 🌸</h1>
    <p class="sub">${t("sub0")}</p>
    <input type="text" id="inName" placeholder="${t("name")}" value="${esc(S.name)}"/>
    <div class="or">${t("or")}</div>
    <input type="text" id="inL4" inputmode="numeric" maxlength="4" placeholder="${t("last4")}" value="${esc(S.last4)}" style="text-align:center;letter-spacing:.35em"/>
    <p class="sub" style="margin:8px 0 0;font-size:11.5px;text-align:center">🔒 ${t("privacy")}</p>
    <div id="retBox"></div>
    <button class="cta" id="go0">${t("next")} →</button>`;
  $("inL4").addEventListener("input", async e=>{
    S.last4 = e.target.value.trim();
    if(S.last4.length===4){
      try{ const r = await rpc("fn_get_returning",{p_salon:SALON,p_last4:S.last4});
        if(r.found){ S.ret=r; showReturn(r); } }catch(err){}
    } else { S.ret=null; $("retBox").innerHTML=""; }
  });
  $("inName").addEventListener("input", e=> S.name=e.target.value);
  $("go0").onclick = ()=>{ S.name=$("inName").value.trim(); step=1; render(); };
}
function showReturn(r){
  const polish = r.last_polish ? ` · 💅 ${esc(r.last_polish)}` : "";
  const worker = r.last_worker ? ` · ${lang==="vi"?"thợ":"with"} ${esc(r.last_worker)}` : "";
  $("retBox").innerHTML = `
    <div style="border:2px solid var(--gold);background:#fffaf2;border-radius:16px;padding:12px;margin-top:12px">
      <div style="font-weight:700;color:#7a5c25">${t("wb")} ${esc(r.display_name)}! 🌸</div>
      <div style="font-size:12.5px;color:#9a7b3f;margin:3px 0 8px">${t("lastTime")}: <b>${esc(r.last_service||"")}</b>${polish}${worker}</div>
      <button class="cta" style="margin:0;padding:12px" id="redoBtn">⭐ ${t("redo")}</button>
      <button class="ghost" id="menuBtn">${t("seeMenu")}</button>
    </div>`;
  $("redoBtn").onclick = ()=> submit(true);
  $("menuBtn").onclick = ()=>{ S.name = S.ret.display_name; step=1; render(); };
}

function s1(){
  $("app").innerHTML = `
    <button class="back" onclick="step=0;render()">${t("back")}</button>
    <h1>${t("q1")}</h1>
    <div style="height:8px"></div>
    <div class="groups">${MENU.groups.map((g,i)=>`
      <button class="gcard" onclick="pickGroup(${i})">
        ${g.save?`<span class="sv">${esc(g.save)}</span>`:""}
        <img src="${esc(g.img)}" alt="" loading="lazy"/>
        <span class="gt"><span class="nm">${esc(L(g))}</span><br/>
        <span class="pr">${esc(Ld(g))} · ${lang==="vi"?"từ":"from"} $${g.from}</span></span>
      </button>`).join("")}</div>`;
}
function pickGroup(i){ S.group=MENU.groups[i]; S.pkg=null; S.opts=[]; step=2; render(); }

function s2(){
  const g=S.group;
  $("app").innerHTML = `
    <button class="back" onclick="step=1;render()">${t("back")}</button>
    <h1>${esc(L(g))} — ${t("q2")}</h1>
    <div style="height:10px"></div>
    ${g.packages.map((p,i)=>`
      <div class="pk ${p.pop?"pop":""} ${S.pkg&&S.pkg.k===p.k?"sel":""}" onclick="pickPkg(${i})">
        ${p.pop?`<span class="badge">⭐ ${t("pop")}</span>`:""}
        <div class="row1"><span>${esc(L(p))}</span><span>$${p.price}</span></div>
        <div class="d">${esc(Ld(p))}</div>
        <div class="mins">⏱ ${p.min} ${t("mins")}</div>
      </div>`).join("")}`;
}
function pickPkg(i){ S.pkg=S.group.packages[i];
  step = (S.group.options&&S.group.options.length)?3:4; render(); }

function s3(){
  const g=S.group, tip=(g.options||[]).find(o=>o["tip_"+lang]||o.tip_vi);
  $("app").innerHTML = `
    <button class="back" onclick="step=2;render()">${t("back")}</button>
    <h1>${t("q3")}</h1>
    ${tip?`<div class="tip">✨ ${esc(tip["tip_"+lang]||tip.tip_vi)}</div>`:""}
    <div class="chips">${g.options.map(o=>`
      <button class="chip ${S.opts.includes(o.k)?"sel":""}" onclick="tgOpt('${o.k}')">${esc(L(o))}${o.d?` +$${o.d}`:""}</button>`).join("")}</div>
    <button class="cta" onclick="step=4;render()">${t("next")} →</button>`;
}
function tgOpt(k){ S.opts = S.opts.includes(k) ? [] : [k]; render(); }

function s4(){
  $("app").innerHTML = `
    <button class="back" onclick="step=${(S.group.options&&S.group.options.length)?3:2};render()">${t("back")}</button>
    <h1>${t("q4")}</h1>
    <p class="sub">${t("skip")}</p>
    <div class="chips">${MENU.addons.map(a=>`
      <button class="chip ${S.addons.includes(a.k)?"sel":""}" onclick="tgAdd('${a.k}')">${a.hot?"🔥 ":""}${esc(L(a))} +$${a.price}</button>`).join("")}</div>
    <button class="cta" onclick="step=5;render()">${t("next")} →</button>`;
}
function tgAdd(k){ const i=S.addons.indexOf(k); if(i>=0) S.addons.splice(i,1); else S.addons.push(k); render(); }

function s5(){
  $("app").innerHTML = `
    <button class="back" onclick="step=4;render()">${t("back")}</button>
    <h1>${t("q5")}</h1>
    ${S.name?"":`<input type="text" id="inName2" placeholder="${t("name")}" style="margin-bottom:10px"/>`}
    <p class="sub" style="margin:6px 0 4px;font-weight:700;color:#4a323d">${t("reqW")}</p>
    <div class="wk"><button class="${S.worker?"":"sel"}" onclick="S.worker=null;render()">🤝 ${t("anyW")}</button>
      ${WORKERS.map(w=>`<button class="${S.worker===w.id?"sel":""}" onclick="S.worker='${w.id}';render()">${esc(w.name)}</button>`).join("")}</div>
    <p class="sub" style="margin:12px 0 4px;font-weight:700;color:#4a323d">${t("party")}</p>
    <div class="chips">${[1,2,3,4].map(n=>`<button class="chip ${S.party===n?"sel":""}" onclick="S.party=${n};render()">${n}</button>`).join("")}</div>
    <p class="sub" style="font-size:11.5px;margin:10px 0 0">ℹ️ ${t("estNote")}</p>
    <button class="cta" id="goFinal">💅 ${t("checkin")} — ~$${price()}</button>`;
  const n2=$("inName2"); if(n2) n2.addEventListener("input",e=>S.name=e.target.value);
  $("goFinal").onclick = ()=> submit(false);
}

async function submit(repeat){
  try{
    const intake = repeat ? {repeat:true, summary:S.ret.last_service, est_price:S.ret.last_price||null}
      : { group:S.group.key, group_label:L(S.group),
          package:S.pkg.k, package_label:L(S.pkg)+" $"+S.pkg.price,
          options:S.opts.map(k=>{const o=S.group.options.find(x=>x.k===k);return o?L(o):k;}),
          addons:S.addons.map(k=>{const a=MENU.addons.find(x=>x.k===k);return a?L(a)+" +$"+a.price:k;}),
          est_price:price(), est_minutes:minutes() };
    const service = repeat ? "hands" : S.group.map;
    const res = await rpc("fn_customer_checkin_v2",{p_salon:SALON, p_service:service, p_intake:intake,
      p_display_name:(S.name||null),
      p_phone_last4:S.last4||null, p_requested_worker_id:S.worker, p_party:S.party});
    TICKET = {id:res.checkin_id, name:S.name||(S.ret&&S.ret.display_name)||"", t:Date.now()};
    if(!KIOSK) localStorage.setItem("ns_ticket", JSON.stringify(TICKET));
    showEst(false); step=99;
    ticketScreen(true);
  }catch(e){ alert(t("fail")+"\n"+e.message); }
}

/* ---------- VÉ THEO DÕI SỐNG: chờ → tới lượt (chuông) → đang làm → TỰ BẬT chấm sao ---------- */
let TICKET=null, tkTimer=null, tkPhase="", AC=null;
function ding(){ try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    [0,.3].forEach(t0=>{ const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g); g.connect(AC.destination); o.frequency.value=1175;
      g.gain.setValueAtTime(.0001,AC.currentTime+t0);
      g.gain.exponentialRampToValueAtTime(.4,AC.currentTime+t0+.02);
      g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+t0+.3);
      o.start(AC.currentTime+t0); o.stop(AC.currentTime+t0+.32); });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([250,120,400]); }

function clearTicket(){ TICKET=null; tkPhase=""; clearInterval(tkTimer);
  localStorage.removeItem("ns_ticket"); S=resetSel(); step=0; render(); }

function ticketScreen(first){
  step=99; showEst(false);
  if(first){ $("app").innerHTML = `
    <div class="done">
      <div class="big">💖</div>
      <h1>${t("doneT")}${TICKET.name?(lang==="vi"?" "+esc(TICKET.name)+" ơi!":", "+esc(TICKET.name)+"!"):"!"}</h1>
      <p class="sub">${t("doneSub")}</p>
      <div class="tip" style="text-align:left">📲 ${t("keepOpen")}</div>
      <div id="tkBody"></div>
      <button class="cta" onclick="location.href='drink.html?salon=${SALON}&waiting=1'">🍹 ${t("drinkCta")}</button>
      <button class="ghost" onclick="clearTicket()">${t("again")}</button>
    </div>`; }
  clearInterval(tkTimer);
  pollTicket();
  tkTimer = setInterval(pollTicket, 7000);
}

async function pollTicket(){
  if(!TICKET) return;
  let r; try{ r = await rpc("fn_track_checkin",{p_checkin_id:TICKET.id}); }catch(e){ return; }
  if(!r.found || r.cstatus==="cancelled"){
    if(tkPhase!=="cancelled"){ tkPhase="cancelled";
      $("app").innerHTML = `<div class="done"><div class="big">🙏</div><h1>${t("tCancel")}</h1>
        <button class="ghost" onclick="clearTicket()">${t("again")}</button></div>`; }
    clearInterval(tkTimer); localStorage.removeItem("ns_ticket"); return;
  }
  const done = r.sstatus==="completed" || r.sstatus==="feedback_sent";
  if(done && r.token){
    clearInterval(tkTimer);
    if(r.feedback_done){ ratingThanks(); return; }
    if(tkPhase!=="rate"){ tkPhase="rate"; ding(); ratingScreen(r); }
    return;
  }
  const box = $("tkBody"); if(!box) return;
  if(r.sstatus==="pending" || r.sstatus==="in_progress"){
    if(tkPhase!=="up" && r.sstatus==="pending"){ tkPhase="up"; ding(); }
    if(r.sstatus==="in_progress") tkPhase="doing";
    box.innerHTML = `<div class="qrow" style="font-size:16px;font-weight:700;color:var(--rose-deep)">
        ${r.sstatus==="pending"?`📢 ${t("tUp")}`:`💅 ${t("tDoing")}`}</div>
      <div class="qrow">${t("tChair")} <b>${r.chair??"—"}</b>${r.worker?` · ${t("tUpSub")} <b>${esc(r.worker)}</b>`:""}</div>`;
  } else {
    tkPhase="wait";
    box.innerHTML = `<div class="qrow">⏳ ${t("tWait")} — ${t("ahead")} <b>${r.ahead} ${t("people")}</b> · ${t("wait")} ~${Math.max(r.ahead*25,5)} ${t("mins")}</div>`;
  }
}

/* ---------- CHẤM SAO 2 NHÁNH: ⭐1-3 xin lỗi+trắc nghiệm+SĐT · ⭐4 hỏi nhẹ · ⭐5 mời Google ---------- */
let RATE=0, FBISS=[];
const ISSUES=[["wait","isWait"],["attitude","isAtt"],["quality","isQual"],["price","isPrice"],["clean","isClean"],["other","isOther"]];
function issueChips(){ return `<div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:4px 0 10px">
  ${ISSUES.map(([k,lk])=>`<button class="chip ${FBISS.includes(k)?"sel":""}" data-iss="${k}" style="padding:9px 13px">${t(lk)}</button>`).join("")}</div>`; }
function fbExtra(){
  if(RATE>=5||!RATE) return "";
  if(RATE===4) return `<div style="margin-top:4px"><b style="color:var(--rose-deep)">${t("fbMid")}</b>
    <p class="sub" style="margin:4px 0 8px">${t("fbMidSub")}</p>${issueChips()}</div>`;
  return `<div style="margin-top:4px"><b style="color:var(--rose-deep)">${t("fbSorry")}</b>
    <p class="sub" style="margin:4px 0 8px">${t("fbSorrySub")}</p>${issueChips()}
    <input id="fbPhone" inputmode="tel" placeholder="${t("fbPhone")}"
      style="width:100%;border:1.5px solid var(--line);border-radius:14px;padding:11px;font:14px var(--sans);margin-bottom:4px"/></div>`;
}
function ratingScreen(r){
  $("app").innerHTML = `
    <div class="done">
      <div class="big">✨</div>
      <h1>${t("tDone")}</h1>
      <p class="sub">${t("tDoneSub")}${r.worker?` · ${t("tUpSub")} ${esc(r.worker)}`:""}</p>
      <div id="stars" style="font-size:40px;letter-spacing:6px;cursor:pointer;user-select:none;margin:6px 0 12px">
        ${[1,2,3,4,5].map(n=>`<span data-n="${n}" style="filter:grayscale(1)">⭐</span>`).join("")}</div>
      <div id="fbX"></div>
      <textarea id="cmt" placeholder="${t("tCmt")}" style="width:100%;border:1.5px solid var(--line);border-radius:14px;padding:11px;font:14px var(--sans);min-height:64px"></textarea>
      <button class="cta" id="rateGo" disabled>${t("tSend")} →</button>
    </div>`;
  const draw=()=>{ const ph=$("fbPhone")?$("fbPhone").value:"";
    $("fbX").innerHTML=fbExtra();
    if($("fbPhone")&&ph) $("fbPhone").value=ph;
    document.querySelectorAll("#fbX [data-iss]").forEach(b=>b.onclick=()=>{
      const k=b.dataset.iss; FBISS=FBISS.includes(k)?FBISS.filter(x=>x!==k):[...FBISS,k]; draw(); });
  };
  document.querySelectorAll("#stars span").forEach(s=>s.onclick=()=>{
    RATE = parseInt(s.dataset.n,10); FBISS=[];
    document.querySelectorAll("#stars span").forEach(x=>x.style.filter = parseInt(x.dataset.n,10)<=RATE?"none":"grayscale(1)");
    $("rateGo").disabled=false; draw();
  });
  $("rateGo").onclick = async ()=>{
    $("rateGo").disabled=true;
    try{ const res = await rpc("fn_submit_feedback",{p_token:r.token, p_rating:RATE,
        p_comment:($("cmt").value.trim()||null),
        p_issues:(FBISS.length?FBISS:null),
        p_phone:($("fbPhone")&&$("fbPhone").value.trim())||null});
      ratingThanks(res); }
    catch(e){ $("rateGo").disabled=false; alert(e.message); }
  };
}
function ratingThanks(res){
  clearInterval(tkTimer); localStorage.removeItem("ns_ticket");
  const low = res && res.tier==="low";
  const link = res && res.review_link;
  $("app").innerHTML = `<div class="done"><div class="big">${low?"🙏":"💖"}</div>
    <h1>${low?t("fbLowDone"):t("tThanks")}</h1>
    <p class="sub">${low?t("fbLowDoneSub"):t("tThanksSub")+" · "+t("tBye")}</p>
    ${link?`<p class="sub" style="margin-top:10px"><b>${t("fbGoogle")}</b></p>
      <button class="cta" onclick="window.open('${link.replace(/'/g,"")}','_blank')">${t("fbGoogleBtn")}</button>`:""}
    <button class="ghost" onclick="clearTicket()">${t("again")}</button></div>`;
}

(async ()=>{
  if(!SALON){ $("app").innerHTML=`<h1>${t("noSalon")}</h1>`; return; }
  try{
    const r = await rpc("fn_get_menu",{p_salon:SALON});
    MENU = r.menu; WORKERS = r.workers||[];
    $("brand").innerHTML = esc(r.salon_name||"NailSync");
    setLang(lang);
    // khách mở lại trang khi còn vé sống (<6 tiếng) → quay lại màn theo dõi, không bắt check-in lại
    if(!KIOSK){ try{
      const tk = JSON.parse(localStorage.getItem("ns_ticket")||"null");
      if(tk && tk.id && Date.now()-tk.t < 6*3600*1000){ TICKET = tk; ticketScreen(true); }
      else localStorage.removeItem("ns_ticket");
    }catch(e){} }
  }catch(e){ $("app").innerHTML=`<h1>😢</h1><p class="sub">${esc(e.message)}</p>`; }
})();
</script>
