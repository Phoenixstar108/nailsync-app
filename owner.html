<!doctype html>
<!-- NailSync Block 1 · owner.html v2 — DASHBOARD CHỦ TIỆM
     PIN chủ riêng (pilot 1357). 5 tab:
       📊 Hôm nay  — số liệu live + so hôm qua + trên sàn + chart giờ + 💡 insight
       📦 Cuối ngày — digest chốt sổ từng ngày + TRẮC NGHIỆM 1 câu/ngày (owner_pulse) + lịch sử 7 ngày
       ⭐ Thợ      — hôm nay + 30 ngày
       💬 Feedback — lọc 🔴/🟡/✓, gọi lại, xử lý

     URL: owner.html?salon=<SALON_ID> -->
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>NailSync — Chủ tiệm</title>
<style>
  :root{--bg:#221219;--card:#2d1a22;--card2:#3a2230;--ink:#f6e9ef;--muted:#b89aa8;--line:#4a2c3b;
    --rose:#ff4f8e;--rose-deep:#ff86b3;--gold:#e7b765;--green:#43c478;--red:#ff5b6e;--amber:#f0b34e;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100svh}
  .wrap{max-width:580px;margin:0 auto;padding:16px 14px 92px}
  h1{font-size:20px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 0}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .pill{border:1px solid var(--line);background:var(--card);color:var(--rose-deep);font:600 13px var(--sans);padding:8px 13px;border-radius:999px;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:11px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;text-align:center}
  .stat .v{font-size:24px;font-weight:800;color:var(--rose-deep)}
  .stat .l{color:var(--muted);font-size:11.5px;margin-top:3px}
  .stat .d{font-size:11.5px;font-weight:700;margin-top:2px}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
  .stat.alert{border-color:var(--red)} .stat.alert .v{color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{color:var(--muted);font-weight:600;text-align:left;padding:6px 4px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:9px 4px;border-bottom:1px solid var(--line)}
  td.r,th.r{text-align:right}
  .fb{border-left:4px solid var(--green)}
  .fb.mid{border-left-color:var(--amber)}
  .fb.low{border-left-color:var(--red)}
  .fb .meta{color:var(--muted);font-size:12px}
  .fb .cmt{margin:7px 0;font-size:14px}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .tag{background:var(--card2);border:1px solid var(--line);border-radius:999px;font-size:11.5px;padding:4px 10px;color:var(--rose-deep)}
  .btn{border:0;border-radius:12px;font:700 13.5px var(--sans);padding:10px 14px;cursor:pointer;color:#fff;background:linear-gradient(145deg,#e23a7e,#b3164e)}
  .btn.ghost{background:var(--card2);color:var(--rose-deep);border:1px solid var(--line)}
  .btn.green{background:var(--green);color:#08220f}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  input,textarea{width:100%;background:var(--card2);border:1.5px solid var(--line);border-radius:13px;color:var(--ink);font:14px var(--sans);padding:11px}
  input:focus,textarea:focus{outline:0;border-color:var(--rose)}
  label{font-size:12.5px;color:var(--muted);display:block;margin:10px 0 5px}
  .tabs{position:fixed;bottom:0;left:0;right:0;background:#1a0d13;border-top:1px solid var(--line);display:flex;z-index:5}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);font:600 10.5px var(--sans);padding:9px 1px 11px;cursor:pointer;position:relative}
  .tabs button.on{color:var(--rose-deep)}
  .tabs .ico{font-size:18px;display:block;margin-bottom:2px}
  .badge{position:absolute;top:3px;right:14%;background:var(--red);color:#fff;border-radius:999px;font-size:10px;font-weight:800;padding:1px 6px}
  .phone{color:var(--gold);font-weight:700;text-decoration:none}
  .stt{font-size:11.5px;font-weight:800;border-radius:8px;padding:3px 8px}
  .stt.new{background:#54121d;color:var(--red)}
  .stt.contacted{background:#4a3a12;color:var(--amber)}
  .stt.resolved{background:#11401f;color:var(--green)}
  .center{text-align:center}
  .login{max-width:360px;margin:14vh auto 0;text-align:center}
  .login input{text-align:center;font-size:24px;letter-spacing:8px}
  .hr{border:none;border-top:1px solid var(--line);margin:13px 0}
  .qbox{background:var(--card2);border:1px dashed var(--line);border-radius:13px;padding:11px;font-size:13.5px;color:var(--rose-deep);margin-bottom:8px}
  .insight{background:linear-gradient(145deg,#3a2230,#2d1a22);border:1px solid var(--line);border-radius:14px;padding:11px 13px;font-size:13.5px;margin:6px 0;line-height:1.45}
  .floor{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .floor:last-child{border-bottom:0}
  .chairno{background:var(--card2);border:1px solid var(--line);border-radius:10px;font-weight:800;color:var(--rose-deep);padding:6px 10px;font-size:13px;min-width:42px;text-align:center}
  .bars{display:flex;align-items:flex-end;gap:3px;height:64px;margin:8px 0 2px}
  .bars .b{flex:1;background:linear-gradient(180deg,#e23a7e,#b3164e);border-radius:4px 4px 0 0;min-height:2px;position:relative}
  .bars .b.zero{background:var(--card2)}
  .barlab{display:flex;gap:3px;font-size:8.5px;color:var(--muted)}
  .barlab span{flex:1;text-align:center}
  .chip{border:1.5px solid var(--line);background:var(--card2);border-radius:999px;padding:9px 13px;font:600 13px var(--sans);color:var(--ink);cursor:pointer;margin:3px 3px 3px 0}
  .chip.sel{border-color:var(--rose);background:#54183a;color:var(--rose-deep)}
  .dnav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .dnav b{font-size:15px}
  .histrow{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer}
  .histrow:hover{color:var(--rose-deep)}
  .flt{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
</style>
</head>

</div>

<script>
const SUPABASE_URL = "https://liavvyeklmixeyudfwxm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpYXZ2eWVrbG1peGV5dWRmd3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3ODgyOTAsImV4cCI6MjA5NjM2NDI5MH0.vzUiOMRkWYSZ4zGejqKAvq0_-C3YIrM_wa0fTyOmT-E";
const SALON = new URLSearchParams(location.search).get("salon");
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
async function rpc(fn,args){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`,{method:"POST",
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,"Content-Type":"application/json"},
    body:JSON.stringify(args||{})});
  const tx=await r.text(); let j=null; try{ j=tx?JSON.parse(tx):null; }catch(e){}
  if(!r.ok){ const m=(j&&(j.message||j.hint))||tx; throw new Error(m); }
  return j;
}
let TOKEN=localStorage.getItem("ns_owner_token")||null, ST=null, TAB="home", timer=null;
let DG=null, DGHIST=[], dgSel=null;   // digest hiện xem + lịch sử

const ISS_VI={wait:"Chờ lâu",attitude:"Thái độ",quality:"Chất lượng móng",price:"Giá",clean:"Vệ sinh",other:"Khác"};

/* ===== TRẮC NGHIỆM CHỦ — 14 câu xoay theo ngày (data về Phoenix Star qua owner_pulse) ===== */
const QUIZ=[
 {k:"q_help",   q:"Hôm nay phần nào của app GIÚP anh/chị nhiều nhất?", c:["Check-in khách","Chia lượt thợ","Gọi nước","Feedback & review","Chưa thấy giúp gì"]},
 {k:"q_next",   q:"Nếu app làm thêm đúng 1 việc, anh/chị chọn gì?", c:["Tính lương thợ","Đặt lịch hẹn","Nhắn tin khách quen","Quản lý tồn sơn"]},
 {k:"q_guest",  q:"Khách của tiệm phản ứng với check-in QR thế nào?", c:["Thích, tự làm được","Bình thường","Nhiều người cần giúp","Không chịu dùng"]},
 {k:"q_staff",  q:"Thợ dùng màn thợ (chuông nhận khách) có trơn tru không?", c:["Trơn tru","Tạm ổn","Hay quên mở","Không chịu dùng"]},
 {k:"q_money",  q:"Doanh thu ước tính trong app có gần số thật không?", c:["Sát","Lệch chút ít","Lệch nhiều","Chưa để ý"]},
 {k:"q_when",   q:"Anh/chị thường mở dashboard lúc nào?", c:["Sáng trước giờ mở","Trong giờ làm","Tối sau đóng cửa","Vài ngày một lần"]},
 {k:"q_pain",   q:"Điều gì làm anh/chị MỆT nhất khi quản tiệm?", c:["Thợ so bì lượt","Khách chờ lâu bỏ về","Review xấu trên mạng","Sổ sách cuối ngày"]},
 {k:"q_remind", q:"App tự nhắn khách quen sau 3 tuần chưa quay lại — anh/chị muốn không?", c:["Muốn ngay","Muốn nhưng để mình duyệt","Không cần"]},
 {k:"q_pin",    q:"PIN nhân viên dùng chung có bất tiện không?", c:["Ổn","Muốn PIN riêng từng thợ","Muốn bỏ PIN"]},
 {k:"q_report", q:"Bản tóm tắt cuối ngày này anh/chị muốn nhận qua đâu?", c:["Trong app thế này","Email","Tin nhắn điện thoại","In ra giấy"]},
 {k:"q_menu",   q:"Giá menu trong app đã đúng giá tiệm chưa?", c:["Đúng","Gần đúng","Sai nhiều","Chưa nhập menu thật"]},
 {k:"q_extra",  q:"Tính năng nào anh/chị thấy THỪA, không dùng?", c:["Gọi nước","Trắc nghiệm chấm khách của thợ","Hỏi đáp này","Không có gì thừa"]},
 {k:"q_refer",  q:"Anh/chị có sẵn lòng giới thiệu app cho chủ tiệm quen không?", c:["Giới thiệu ngay","Chờ dùng thêm vài tuần","Chưa"]},
 {k:"q_speed",  q:"Tốc độ app (mở trang, bấm nút) với anh/chị thế nào?", c:["Nhanh","Chấp nhận được","Chậm","Lúc nhanh lúc chậm"]}];
function quizFor(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  const doy=Math.floor((d - new Date(d.getFullYear(),0,0))/864e5);
  return QUIZ[doy % QUIZ.length];
}

/* ===== 💡 INSIGHT rule-based (vi) — chạy trên payload _day_stats ===== */
function pct(a,b){ if(!b) return null; return Math.round((a-b)/b*100); }
function insights(cur, prev){
  const out=[];
  if(!cur) return out;
  const c=+(cur.customers||0), p=prev?+(prev.customers||0):null;
  if(p!=null && p>0 && c!==p) out.push(`${c>p?"📈":"📉"} Khách ${c>p?"tăng":"giảm"} ${Math.abs(pct(c,p))}% so với hôm trước (${c} vs ${p}).`);
  const r=+(cur.est_revenue||0), pr=prev?+(prev.est_revenue||0):null;
  if(pr!=null && pr>0 && r!==pr) out.push(`${r>pr?"💵":"🪙"} Doanh thu ước tính ${r>pr?"tăng":"giảm"} ${Math.abs(pct(r,pr))}% ($${r} vs $${pr}).`);
  if(+(cur.low_stars||0)>0){
    const lows=cur.low_details||[];
    const cnt={}; lows.forEach(l=>(l.issues||[]).forEach(k=>cnt[k]=(cnt[k]||0)+1));
    const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
    out.push(`⚠️ ${cur.low_stars} lượt ≤3⭐${top?` — vấn đề nhắc nhiều nhất: <b>${ISS_VI[top[0]]||top[0]}</b>`:""}. ${lows.some(l=>l.recovery==="new")?"Còn khách CHƯA được gọi lại.":"Đã xử lý/đang xử lý."}`);
  } else if(+(cur.ratings_in||0)>=2 && +(cur.avg_rating||0)>=4.7){
    out.push(`💖 Khách rất hài lòng — ${cur.avg_rating}⭐ trung bình (${cur.ratings_in} đánh giá), không có lượt thấp.`);
  }
  if(cur.busiest_hour!=null) out.push(`⏰ Giờ đông nhất: <b>${cur.busiest_hour}h–${+cur.busiest_hour+1}h</b> — xếp thợ mạnh vào khung này.`);
  const ts=(cur.top_services||[])[0];
  if(ts) out.push(`💅 Được chọn nhiều nhất: <b>${esc(ts.label)}</b> ×${ts.n}.`);
  if(cur.top_worker) out.push(`🏆 ${esc(cur.top_worker.name)} làm nhiều lượt nhất (${cur.top_worker.n}).`);
  if(+(cur.returning||0)>0) out.push(`💞 ${cur.returning} khách quen quay lại.`);
  if(+(cur.drinks||0)>0) out.push(`🍹 ${cur.drinks} ly nước${cur.top_drink?` — hot: ${esc(cur.top_drink)}`:""}.`);
  return out;
}

/* ---------- LOGIN ---------- */
function loginScreen(msg){
  $("tabs").style.display="none";
  $("app").innerHTML=`<div class="login">
    <div style="font-size:46px">👑</div>
    <h1>Màn chủ tiệm</h1>
    <p class="sub">Nhập PIN chủ (khác PIN nhân viên)</p>
    <div style="height:14px"></div>
    <input id="pin" inputmode="numeric" type="password" maxlength="8" placeholder="••••"/>
    <div style="height:10px"></div>
    <button class="btn" style="width:100%" onclick="doLogin()">Vào dashboard</button>
    <p class="sub" id="lerr" style="color:var(--red)">${esc(msg||"")}</p></div>`;
  $("pin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}
async function doLogin(){
  try{
    const r=await rpc("owner_login",{p_salon:SALON,p_pin:$("pin").value.trim()});
    if(r.status!=="ok"){ $("lerr").textContent=r.message+(r.remaining!=null?` (còn ${r.remaining} lần)`:""); return; }
    TOKEN=r.token; localStorage.setItem("ns_owner_token",TOKEN); boot();
  }catch(e){ $("lerr").textContent=e.message; }
}
function logout(){ localStorage.removeItem("ns_owner_token"); TOKEN=null; clearInterval(timer); loginScreen(); }

/* ---------- DATA ---------- */
async function refresh(){
  try{ ST=await rpc("owner_state",{p_token:TOKEN}); render(); }
  catch(e){ if(String(e.message).startsWith("AUTH")) return loginScreen("Phiên hết hạn — đăng nhập lại nha"); }
}
async function loadDigest(dateStr){
  DG = await rpc("owner_digest", dateStr?{p_token:TOKEN,p_date:dateStr}:{p_token:TOKEN});
  dgSel = DG.date;
  try{ DGHIST = await rpc("owner_digest_history",{p_token:TOKEN}); }catch(e){ DGHIST=[]; }
}
function boot(){ $("tabs").style.display="flex"; refresh(); clearInterval(timer); timer=setInterval(refresh,30000); }

/* ---------- RENDER ---------- */
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=async()=>{
  TAB=b.dataset.t;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("on",x===b));
  if(TAB==="digest" && !DG){ try{ await loadDigest(null); }catch(e){} }
  render();
});
function header(){
  return `<div class="top"><div><h1>${esc(ST.salon_name||"NailSync")} 👑</h1>
    <p class="sub">Dashboard chủ tiệm · tự cập nhật 30s</p></div>
    <button class="pill" onclick="logout()">Thoát</button></div>`;
}
function render(){
  if(!ST) return;
  const need=ST.need_call||0;
  $("fbBadge").style.display=need?"inline":"none"; $("fbBadge").textContent=need;
  $("dgBadge").style.display = (DG && !DG.answered && !DG.live) ? "inline" : "none";
  if(TAB==="home") renderHome();
  else if(TAB==="digest") renderDigest();
  else if(TAB==="workers") renderWorkers();
  else if(TAB==="fb") renderFb();
  else renderMore();
}
function delta(cur,prev,money){
  const c=+(cur||0), p=+(prev||0);
  if(!p) return `<div class="d flat">hôm qua: ${money?"$":""}${p}</div>`;
  const df=pct(c,p);
  const cls=df>0?"up":(df<0?"down":"flat");
  const ar=df>0?"▲":(df<0?"▼":"=");
  return `<div class="d ${cls}">${ar} ${Math.abs(df)}% vs hôm qua</div>`;
}
function renderHome(){
  const t=ST.today||{}, y=ST.yesterday||{};
  const floor=ST.on_floor||[];
  const hourly=t.hourly||{};
  const hours=Array.from({length:13},(_,i)=>i+9); // 9h..21h
  const mx=Math.max(1,...hours.map(h=>+(hourly[h]||0)));
  const ins=insights(t,y);
  $("app").innerHTML=header()+`
    <div class="grid2">
      <div class="stat"><div class="v">${t.customers||0}</div><div class="l">khách xong hôm nay</div>${delta(t.customers,y.customers)}</div>
      <div class="stat"><div class="v">$${Number(t.est_revenue||0).toLocaleString()}</div><div class="l">doanh thu ước tính*</div>${delta(t.est_revenue,y.est_revenue,1)}</div>
      <div class="stat"><div class="v">${t.avg_rating??"—"}</div><div class="l">sao TB (${t.ratings_in||0} đánh giá)</div>${y.avg_rating?`<div class="d flat">hôm qua: ${y.avg_rating}⭐</div>`:""}</div>
      <div class="stat ${ST.need_call?"alert":""}" style="cursor:pointer" onclick="document.querySelector('[data-t=fb]').click()">
        <div class="v">${ST.need_call||0} 🔴</div><div class="l">cần gọi lại — bấm xem</div></div>
    </div>

    <div class="card">
      <b>🪑 Trên sàn ngay bây giờ</b> <span class="sub">· hàng chờ: <b style="color:var(--rose-deep)">${ST.waiting||0}</b> khách</span>
      <div style="margin-top:6px">${
        floor.length? floor.map(f=>`<div class="floor">
          <span class="chairno">G${f.chair}</span>
          <span style="flex:1"><b>${esc(f.worker||"—")}</b> → ${esc(f.customer)}</span>
          <span class="sub">${f.status==="in_progress"?"💅 "+f.mins+"p":"📢 chờ thợ tới"}</span></div>`).join("")
        : `<p class="sub" style="margin:8px 0 2px">Sàn trống — chưa ai đang làm.</p>`}</div>
    </div>

    <div class="card">
      <b>⏰ Khách theo giờ (hôm nay)</b>
      <div class="bars">${hours.map(h=>{const n=+(hourly[h]||0);
        return `<div class="b ${n?"":"zero"}" style="height:${Math.max(4,Math.round(n/mx*100))}%" title="${h}h: ${n}"></div>`;}).join("")}</div>
      <div class="barlab">${hours.map(h=>`<span>${h}</span>`).join("")}</div>
    </div>

    ${ins.length?`<div class="card"><b>💡 App nhận xét</b>${ins.map(i=>`<div class="insight">${i}</div>`).join("")}</div>`:""}
    <p class="sub">*Cộng từ giá tạm tính lúc check-in — POS thật sẽ chính xác hơn (block sau).</p>`;
}

/* ---------- 📦 CUỐI NGÀY ---------- */
let QSEL=null;
function fmtD(d){ const [y,m,dd]=String(d).split("-"); return `${dd}/${m}/${y}`; }
function shiftDay(ds,n){ const d=new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
async function gotoDigest(ds){ try{ await loadDigest(ds); QSEL=null; render(); }catch(e){ alert(e.message); } }
function renderDigest(){
  if(!DG){ $("app").innerHTML=header()+`<div class="card center sub">Đang tải...</div>`; return; }
  const s=DG.stats||{}, qz=quizFor(DG.date);
  const ins=insights(s,null);
  const lows=s.low_details||[];
  const canNext = DG.date < DG.today;
  $("app").innerHTML=header()+`
    <div class="dnav">
      <button class="pill" onclick="gotoDigest('${shiftDay(DG.date,-1)}')">‹ hôm trước</button>
      <b>📦 ${DG.live?"HÔM NAY (tạm tính)":"Chốt sổ "+fmtD(DG.date)}</b>
      <button class="pill" ${canNext?"":"disabled style='opacity:.3'"} onclick="gotoDigest('${shiftDay(DG.date,1)}')">hôm sau ›</button>
    </div>

    <div class="grid2">
      <div class="stat"><div class="v">${s.customers||0}</div><div class="l">khách xong</div></div>
      <div class="stat"><div class="v">$${Number(s.est_revenue||0).toLocaleString()}</div><div class="l">doanh thu ước tính</div></div>
      <div class="stat"><div class="v">${s.avg_rating??"—"}</div><div class="l">sao TB · ${s.five_stars||0}×5⭐ · ${s.low_stars||0}×≤3⭐</div></div>
      <div class="stat"><div class="v">${s.drinks||0}</div><div class="l">ly nước${s.top_drink?` · hot: ${esc(s.top_drink)}`:""}</div></div>
    </div>

    ${ins.length?`<div class="card"><b>💡 Phân tích ngày</b>${ins.map(i=>`<div class="insight">${i}</div>`).join("")}</div>`:""}

    ${lows.length?`<div class="card"><b>🔴 Khách chưa vui hôm đó</b>${lows.map(l=>`
      <div class="floor"><span class="chairno">${l.rating}⭐</span>
        <span style="flex:1"><b>${esc(l.customer||"—")}</b>${(l.issues||[]).length?` · ${(l.issues||[]).map(k=>ISS_VI[k]||k).join(", ")}`:""}</span>
        <span class="stt ${l.recovery}">${l.recovery==="new"?"chưa gọi":(l.recovery==="contacted"?"đã gọi":"xong ✓")}</span></div>`).join("")}</div>`:""}

    <div class="card">
      <b>🗳️ Câu hỏi cho chủ — ${fmtD(DG.date)}</b>
      <p class="sub">Mỗi ngày 1 câu, 10 giây — giúp NailSync hợp với tiệm mình hơn.</p>
      ${DG.answered
        ? `<div class="qbox" style="margin-top:9px">✅ Đã trả lời: <b>${esc((DG.answer&&DG.answer.choice)||"")}</b>${DG.answer&&DG.answer.note?`<br><span class="sub">"${esc(DG.answer.note)}"</span>`:""}<br><span class="sub">Cảm ơn anh/chị nhiều! 🙏</span></div>`
        : `<div class="qbox" style="margin-top:9px">❓ ${esc(qz.q)}</div>
           <div>${qz.c.map(c=>`<button class="chip ${QSEL===c?"sel":""}" onclick="QSEL='${c.replace(/'/g,"\\'")}';render()">${esc(c)}</button>`).join("")}</div>
           <textarea id="qnote" rows="2" placeholder="Nói thêm gì không ạ? (không bắt buộc)" style="margin-top:9px"></textarea>
           <div style="height:9px"></div>
           <button class="btn" ${QSEL?"":"disabled"} onclick="sendPulse('${qz.k}')">Gửi câu trả lời</button>`}
    </div>

    ${DGHIST.length?`<div class="card"><b>🗓️ 7 ngày gần đây</b>
      ${DGHIST.map(h=>`<div class="histrow" onclick="gotoDigest('${h.date}')">
        <span>${fmtD(h.date)}</span><span>${h.customers||0} khách</span>
        <span>$${Number(h.est_revenue||0).toLocaleString()}</span><span>${h.avg_rating??"—"}⭐</span></div>`).join("")}</div>`:""}`;
}
async function sendPulse(qk){
  const qz=quizFor(DG.date);
  const note=$("qnote")?$("qnote").value.trim():null;
  try{
    await rpc("owner_pulse_answer",{p_token:TOKEN,p_asked_on:DG.date,p_qkey:qk,p_question:qz.q,p_choice:QSEL,p_note:note||null});
    await loadDigest(DG.date); QSEL=null; render();
  }catch(e){ alert(e.message); }
}

/* ---------- ⭐ THỢ ---------- */
function renderWorkers(){
  const ws=ST.workers||[];
  $("app").innerHTML=header()+`<div class="card">
    <b>⭐ Review thợ</b>
    <table style="margin-top:8px"><tr><th>Thợ</th><th class="r">Hôm nay</th><th class="r">30 ngày</th><th class="r">Sao TB</th><th class="r">≤3⭐</th></tr>
    ${ws.map(w=>`<tr><td><b>${esc(w.name)}</b></td>
      <td class="r" style="color:var(--rose-deep);font-weight:700">${w.jobs_today||0}</td>
      <td class="r">${w.jobs_30d}</td>
      <td class="r">${w.avg_rating??"—"}</td>
      <td class="r" style="color:${w.low_30d>0?"var(--red)":"var(--muted)"};font-weight:${w.low_30d>0?800:400}">${w.low_30d}</td></tr>`).join("")||"<tr><td colspan=5 class='sub'>Chưa có lượt nào</td></tr>"}
    </table></div>`;
}

/* ---------- 💬 FEEDBACK (filter) ---------- */
let FFLT="all";
function renderFb(){
  const all=ST.feedbacks||[];
  const fbs=all.filter(f=> FFLT==="all" ? true :
    FFLT==="new" ? (f.rating<=3 && f.recovery==="new") :
    FFLT==="mid" ? f.rating===4 :
    FFLT==="done" ? (f.recovery==="contacted"||f.recovery==="resolved") : true);
  const cnt=k=>all.filter(f=> k==="new"?(f.rating<=3&&f.recovery==="new"):k==="mid"?f.rating===4:(f.recovery==="contacted"||f.recovery==="resolved")).length;
  $("app").innerHTML=header()+`
    <div class="flt">
      ${[["all","Tất cả ("+all.length+")"],["new","🔴 Cần gọi ("+cnt("new")+")"],["mid","🟡 4⭐ ("+cnt("mid")+")"],["done","✓ Đã xử lý ("+cnt("done")+")"]]
        .map(([k,l])=>`<button class="chip ${FFLT===k?"sel":""}" onclick="FFLT='${k}';render()">${l}</button>`).join("")}
    </div>`+
    (fbs.length?"":`<div class="card center sub">Không có feedback trong nhóm này (7 ngày)</div>`)+
    fbs.map(f=>{
      const cls=f.rating<=3?"low":(f.rating===4?"mid":"");
      const stars="⭐".repeat(f.rating);
      const tags=(f.issues||[]).map(k=>`<span class="tag">${esc(ISS_VI[k]||k)}</span>`).join("");
      const act = f.rating<=3 ? (
        f.recovery==="resolved" ? `<span class="stt resolved">✓ đã xử lý${f.note?" · có ghi chú":""}</span>` :
        `<span class="stt ${f.recovery}">${f.recovery==="new"?"🔴 cần gọi":"🟡 đã gọi"}</span>
         ${f.recovery==="new"?`<button class="btn ghost" onclick="setRec('${f.id}','contacted')">📞 Đã gọi</button>`:""}
         <button class="btn green" onclick="setRec('${f.id}','resolved')">✓ Đã xử lý</button>`) : "";
      return `<div class="card fb ${cls}">
        <div class="meta">${esc(f.at)} · thợ <b>${esc(f.worker||"—")}</b>${f.customer?` · khách <b>${esc(f.customer)}</b>`:""}</div>
        <div style="font-size:17px;margin-top:4px">${stars} <span class="meta">(${f.rating})</span></div>
        ${f.comment?`<div class="cmt">"${esc(f.comment)}"</div>`:""}
        ${tags?`<div class="tagrow">${tags}</div>`:""}
        ${f.phone?`<div style="margin:6px 0">📞 <a class="phone" href="tel:${esc(f.phone)}">${esc(f.phone)}</a></div>`:""}
        ${f.note?`<div class="meta">Ghi chú: ${esc(f.note)}</div>`:""}
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap">${act}</div>
      </div>`;}).join("");
}
async function setRec(id,status){
  let note=null;
  if(status==="resolved") note=prompt("Ghi chú xử lý (vd: đã gọi xin lỗi, tặng 20% lần sau) — bỏ trống cũng được:")||null;
  try{ await rpc("owner_set_recovery",{p_token:TOKEN,p_feedback:id,p_status:status,p_note:note}); refresh(); }
  catch(e){ alert(e.message); }
}

/* ---------- ➕ THÊM ---------- */
const QUESTIONS=[
  "Phần nào trong app làm anh/chị thấy KHÓ DÙNG nhất?",
  "Nếu được thêm đúng 1 tính năng, anh/chị muốn gì nhất?",
  "Có số liệu/báo cáo nào anh/chị muốn xem mỗi ngày mà app chưa có?",
  "Thợ và lễ tân than phiền điều gì về app nhiều nhất?",
  "Điều gì suýt làm anh/chị KHÔNG muốn dùng app này?"];
const qToday=QUESTIONS[Math.floor(Date.now()/864e5)%QUESTIONS.length];
function renderMore(){
  const cfg=ST.config||{};
  const sugs=ST.suggestions||[];
  $("app").innerHTML=header()+`
    <div class="card">
      <b>💡 Góp ý cho NailSync</b>
      <p class="sub">Câu trả lời đi thẳng tới đội phát triển app.</p>
      <div class="qbox" style="margin-top:9px">❓ ${esc(qToday)}</div>
      <textarea id="sg" rows="3" placeholder="Anh/chị cứ nói thẳng ạ..."></textarea>
      <div style="height:9px"></div>
      <button class="btn" onclick="sendSug()">Gửi góp ý</button>
      ${sugs.length?`<div class="hr"></div><p class="sub">Đã gửi gần đây:</p>`+
        sugs.map(s=>`<div class="meta" style="margin:6px 0">· ${esc(s.content)} <span style="opacity:.6">(${esc(s.at)})</span></div>`).join(""):""}
    </div>
    <div class="card">
      <b>⚙️ Link Google review</b>
      <label>Dán link trang review của tiệm (Google Maps → Share review form)</label>
      <input id="rlink" placeholder="https://g.page/r/..." value="${esc(cfg.review_link||"")}"/>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:11px">
        <input type="checkbox" id="rgate" style="width:auto" ${cfg.review_gating!==false?"checked":""}/>
        <span>Chỉ khách <b>5⭐</b> mới thấy nút Google (tắt = khách nào gửi xong cũng thấy)</span></label>
      <div style="height:9px"></div>
      <button class="btn" onclick="saveLink()">Lưu</button>
    </div>
    <div class="card">
      <b>🔑 Đổi PIN chủ</b>
      <label>PIN mới (≥4 số) — PIN nhân viên không đổi</label>
      <input id="npin" inputmode="numeric" type="password" maxlength="8" placeholder="••••"/>
      <div style="height:9px"></div>
      <button class="btn" onclick="savePin()">Đổi PIN</button>
    </div>`;
}
async function sendSug(){
  const v=$("sg").value.trim(); if(!v) return;
  try{ await rpc("owner_suggest",{p_token:TOKEN,p_question:qToday,p_content:v}); $("sg").value=""; refresh(); alert("Đã gửi — cảm ơn anh/chị! 🙏"); }
  catch(e){ alert(e.message); }
}
async function saveLink(){
  try{ await rpc("owner_set_review_link",{p_token:TOKEN,p_url:($("rlink").value.trim()||null),p_gating:$("rgate").checked}); refresh(); alert("Đã lưu ✓"); }
  catch(e){ alert(e.message); }
}
async function savePin(){
  const v=$("npin").value.trim(); if(v.length<4) return alert("PIN tối thiểu 4 số");
  try{ await rpc("owner_set_pin",{p_token:TOKEN,p_new:v}); $("npin").value=""; alert("Đã đổi PIN chủ ✓"); }
  catch(e){ alert(e.message); }
}

/* ---------- BOOT ---------- */
if(!SALON){ $("app").innerHTML="<h1>Thiếu mã tiệm trong link</h1>"; }
else if(TOKEN){ boot(); }
else loginScreen();
</script>
</body>
</html>
